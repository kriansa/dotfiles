# vim: tw=0
# Enable extra terminal features
# Use: `tmux display -p '#{client_termfeatures}'` to list all detected features
set -ga terminal-features ",*:hyperlinks,*:extkeys"

# Enhance terminal experience
set -g mode-keys vi                # Use vi key bindings for when on copy-mode
set -g status-keys emacs           # Use emacs key bindings at the command prompt (so <esc> cancels)
set -g focus-events on             # Send focus events to client applications
set -g allow-passthrough all       # Allow passthrough of unknown escape sequences to applications
set -g set-clipboard on            # Use system clipboard for copy/paste
set -g extended-keys always        # Allow usage of extended key sequences (such as c-enter)
set -g extended-keys-format csi-u  # Use the more modern CSI-u format for extended keys
set -g mouse on                    # Enable mouse support for pane and window selection, resizing, and scrolling

# We don't use history on the terminal emulator, so tmux is responsible for keeping a scrollback
# buffer for convenience
set -g history-limit 200000

# Basic display settings
set -g base-index 1           # start windows numbering at 1
set -g pane-base-index 1      # make pane numbering consistent with windows
set -g automatic-rename on    # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on
set -g set-titles-string "#{s/\#\\[[^]]*\\]//:window_name}"

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

# Activity
set -g monitor-activity off
set -g monitor-bell on
set -g bell-action other # Ignore bell in current window

# Status
set -g status-interval 1 # update the status line every second

# Display the session name if there's a named one
set -g status-left "#{?session_name,#[bg=colour12 fg=black bold] #S #[default],}"

# Show a yellow ball on the right while waiting for a key after the prefix.
set -g status-right "#{?client_prefix,#[fg=colour13] ● ,}"
set -g status-right-length 4
set -g status-justify left
set -g status-left-length 100

# Window list status styling
set -g window-status-separator ''  # No spaces between windows in the status bar.
set -g window-status-format         " #[fg=#{?#{@active-is-nested},colour19,darkgray}]#I:#[default]#W#{?window_zoomed_flag, #[fg=darkgray]󰁌 ,#{?pane_synchronized, #[fg=darkgray]󱢓 ,}} "
set -g window-status-current-format " #[fg=#{?#{@active-is-nested},red,darkgray}]#I:#[default]#W#{?window_zoomed_flag, #[fg=green]󰁌 ,#{?pane_synchronized, #[fg=yellow]󱢓 ,}} "

# Disable mouse-wheel window switching on the status bar (one flick = many ticks = jumps).
unbind -T root WheelUpStatus
unbind -T root WheelDownStatus

# tmux-nest integration
# ---------------------
# Two @-options coordinate the wrapper's behavior across the outer/inner
# boundary. They live on different scopes and identify the two sides of a
# nesting relationship:
#
#   @nest-host  — Pane option, set by `tmux-nest` on the OUTER pane that hosts
#                 a nested tmux server. Value is the user-facing session name
#                 (the inner socket uses a sanitized form of it). Drives outer
#                 behavior only:
#                   • C-\ routing to `inner_emuprefix` (below)
#                   • forwarding root-table keys (C-l, S-PageUp, M-f, …) to
#                     the inner pane
#                   • fading the outer's tab numbers via @active-is-nested
#                     (the session-level mirror below)
#
#   @nest-inner — Server option, set by `tmux-nest` on the INNER tmux server
#                 itself. The inner is a separate server (different socket)
#                 and can't read @nest-host, so it gets its own marker.
#                 Drives inner-only behavior: dynamic bell-action via the
#                 focus hooks below.
#
# Mirror the focused pane's @nest-host onto a session-level @active-is-nested
# so the status format can fade tab numbers while focus is on a nested tmux
# session.
set-hook -ag client-session-changed 'set-option -F @active-is-nested "#{@nest-host}"'
set-hook -ag session-window-changed 'set-option -F @active-is-nested "#{@nest-host}"'
set-hook -ag window-pane-changed    'set-option -F @active-is-nested "#{@nest-host}"'
set-hook -ag pane-focus-in          'set-option -F @active-is-nested "#{@nest-host}"'

# Inner-only: when the outer pane that hosts this inner gains/loses focus, the
# outer propagates focus events to us. Adjust bell-action accordingly so the
# inner filters bells normally while visible (other), but forwards every bell
# while hidden (any) — so the outer can ring the nested tab. Hooks register on
# every server; the @nest-inner gate makes them no-ops on the outer.
set-hook -ag pane-focus-in  'if-shell -F "#{@nest-inner}" "set-option -g bell-action other"'
set-hook -ag pane-focus-out 'if-shell -F "#{@nest-inner}" "set-option -g bell-action any"'

# Bindings
set -g prefix "C-;"

# Creates a custom key table so that we can send custom keystrokes to tmux using any terminal
# emulator that is capable of doing so. Instead of worrying about sending the right keycode and
# capturing it directly on tmux, we send all keystrokes that we want to bind as key codes prefixed
# by C-\\ (hex 0x1c) and it can be picked up here by using this custom key table.
# This is what allows term emulator bindings to work cross platform between Linux and MacOS
bind -n C-\\ if-shell -F '#{@nest-host}' 'switch-client -T inner_emuprefix' 'switch-client -T emuprefix'

# new window
bind -T emuprefix t new-window

# new nested tmux session in a fresh outer window (Super+Shift+T).
# Ask for the name with tmux's own command-prompt (Esc cancels, Ctrl-W/Ctrl-U
# edit — all portable, no shell/readline involved), then open a new outer
# window that runs tmux-nest there. Quoting passes a name with spaces intact;
# an empty name makes tmux-nest exit immediately.
bind -T emuprefix T command-prompt -p "Nested session name:" "new-window \"tmux-nest '%%'\""

# splitting windows
bind -T emuprefix d split-window -h -c "#{pane_current_path}"
bind -T emuprefix D split-window -c "#{pane_current_path}"

# toggle pane zoom
bind -T emuprefix Enter resize-pane -Z

# navigate panels without cycling through them (alt + hjkl)
bind -T emuprefix h select-pane -LZ
bind -T emuprefix l select-pane -RZ
bind -T emuprefix j select-pane -DZ
bind -T emuprefix k select-pane -UZ

# pane resizing (alt-shift + hjkl)
bind -T emuprefix H resize-pane -L 2
bind -T emuprefix J resize-pane -D 2
bind -T emuprefix K resize-pane -U 2
bind -T emuprefix L resize-pane -R 2

# navigate between window (tabs)
bind -T emuprefix ] next-window
bind -T emuprefix [ previous-window
bind -T emuprefix "}" next-window
bind -T emuprefix "{" previous-window
bind -T emuprefix 0 select-window -t 0
bind -T emuprefix 1 select-window -t 1
bind -T emuprefix 2 select-window -t 2
bind -T emuprefix 3 select-window -t 3
bind -T emuprefix 4 select-window -t 4
bind -T emuprefix 5 select-window -t 5
bind -T emuprefix 6 select-window -t 6
bind -T emuprefix 7 select-window -t 7
bind -T emuprefix 8 select-window -t 8
bind -T emuprefix 9 select-window -t 9

# When focus is on a pane running a nested tmux session, C-\ enters this
# table instead of `emuprefix`. Most keys are forwarded to the inner pane so
# the nested tmux receives them as its own emuprefix. The curly braces are
# intentional exceptions: they act on the OUTER tmux so you can leave the
# nested pane via outer's next/prev-window.
bind -T inner_emuprefix t     send-keys C-\\ t
bind -T inner_emuprefix d     send-keys C-\\ d
bind -T inner_emuprefix D     send-keys C-\\ D
bind -T inner_emuprefix Enter send-keys C-\\ Enter
bind -T inner_emuprefix h     send-keys C-\\ h
bind -T inner_emuprefix j     send-keys C-\\ j
bind -T inner_emuprefix k     send-keys C-\\ k
bind -T inner_emuprefix l     send-keys C-\\ l
bind -T inner_emuprefix H     send-keys C-\\ H
bind -T inner_emuprefix J     send-keys C-\\ J
bind -T inner_emuprefix K     send-keys C-\\ K
bind -T inner_emuprefix L     send-keys C-\\ L
bind -T inner_emuprefix "]"   send-keys C-\\ "]"
bind -T inner_emuprefix "["   send-keys C-\\ "["
bind -T inner_emuprefix 0     send-keys C-\\ 0
bind -T inner_emuprefix 1     send-keys C-\\ 1
bind -T inner_emuprefix 2     send-keys C-\\ 2
bind -T inner_emuprefix 3     send-keys C-\\ 3
bind -T inner_emuprefix 4     send-keys C-\\ 4
bind -T inner_emuprefix 5     send-keys C-\\ 5
bind -T inner_emuprefix 6     send-keys C-\\ 6
bind -T inner_emuprefix 7     send-keys C-\\ 7
bind -T inner_emuprefix 8     send-keys C-\\ 8
bind -T inner_emuprefix 9     send-keys C-\\ 9

# Exceptions: keep outer behavior for window navigation and creating new nested sessions
bind -T inner_emuprefix "{" previous-window
bind -T inner_emuprefix "}" next-window
bind -T inner_emuprefix T   command-prompt -p "Nested session name:" "new-window \"tmux-nest '%%'\""

# ---------------------------------------
# Bindings using the default prefix table

# Press prefix twice to send the prefix through to the active pane (e.g. a
# nested tmux client).
bind "C-;" send-prefix

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message -d 500 'Config reloaded'

# Clear both screen and history
bind -n C-l {
  if-shell -F '#{@nest-host}' { send-keys C-l } {
    send-keys C-l
    run 'sleep 0.1'
    clear-history
  }
}

# Enter copy mode
bind Enter copy-mode
bind j copy-mode
bind C-d copy-mode
bind k copy-mode \; send-keys -X cursor-up
bind C-u copy-mode \; send-keys -X halfpage-up
bind -n S-PageUp if-shell -F '#{@nest-host}' { send-keys S-PageUp } { copy-mode ; send-keys -X page-up }
bind -n S-PageDown if-shell -F '#{@nest-host}' { send-keys S-PageDown } { copy-mode ; send-keys -X page-down }

# Enhanced search triggered directly from normal mode
if -b '[[ "$OSTYPE" == "darwin"* ]]' {
  bind -n M-f {
    if-shell -F '#{@nest-host}' { send-keys M-f } {
      copy-mode
      bind -T copy-mode-vi N send-keys -X search-again
      bind -T copy-mode-vi n send-keys -X search-reverse
      command-prompt -i -p "(search)" "send-keys -X search-backward-incremental -- '%%'"
    }
  }
}

if -b '[[ "$OSTYPE" == "linux-gnu" ]]' {
  bind -n C-S-F {
    if-shell -F '#{@nest-host}' { send-keys C-S-F } {
      copy-mode
      bind -T copy-mode-vi N send-keys -X search-again
      bind -T copy-mode-vi n send-keys -X search-reverse
      command-prompt -i -p "(search)" "send-keys -X search-backward-incremental -- '%%'"
    }
  }
}

# Override default search bindings in copy-mode-vi to have n always search
# forward and N always search backward *like I have for nvim*
bind -T copy-mode-vi / command-prompt -T search -p "(search down)" {
  bind -T copy-mode-vi n send-keys -X search-again
  bind -T copy-mode-vi N send-keys -X search-reverse
  send-keys -X search-forward -- "%%"
}
bind -T copy-mode-vi ? command-prompt -T search -p "(search up)" {
  bind -T copy-mode-vi n send-keys -X search-reverse
  bind -T copy-mode-vi N send-keys -X search-again
  send-keys -X search-backward -- "%%"
  bind -T copy-mode-vi n send-keys -X search-again
  bind -T copy-mode-vi N send-keys -X search-reverse
}

# Toggle synchronize panes (send all keystrokes across open panels in a window)
bind s set -w synchronize-panes \; display-message -d 1000 "Pane synchronization: #[bold]#{?pane_synchronized,on,off}#[default]"

# Use same shortcuts as Vim for copy-mode-vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Open a link under the cursor
bind -T copy-mode-vi o run-shell -C \
  "if-shell -F '#{copy_cursor_hyperlink}' \
    'run-shell \"open #{copy_cursor_hyperlink}\"' \
    'send-keys -X copy-pipe-and-cancel \"xargs open\"'"

# Disable default behavior of automatically moving to the end of the terminal after selecting text
# with mouse
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Since MouseDragEnd1Pane neither exit copy-mode nor clear selection now, let single click do
# selection clearing for us.
bind -T copy-mode-vi MouseDown1Pane select-pane\; send-keys -X clear-selection

# Theme
# One light color scheme
set -g status-style fg=white,bg=colour18
set -g window-status-style fg=default,bg=default
set -g window-status-current-style fg=black,bg=white
set -g window-status-activity-style bold
set -g window-status-bell-style bold
set -g pane-border-style fg=colour18
set -g pane-active-border-style fg=cyan
set -g message-style fg=black,bg=red

# Cursor style
set -g cursor-style blinking-block

# Copy mode
set -g copy-mode-selection-style bg=colour19
set -g copy-mode-position-style bg=colour19,bold
set -g copy-mode-position-format '#[align=right][#{scroll_position}/#{history_size}]#{?search_timed_out, (search timed out),#{?#{search_present}, (#{search_count}#{?search_count_partial,+,} results),}}'
