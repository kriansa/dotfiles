---
- name: create base path to be mounted on
  become: true
  become_user: "{{ user_name }}"
  ansible.builtin.file: path={{ home_path }}/SecondDrive state=directory mode=0755

- name: add media fstab entry
  become: true
  notify: mount drives from fstab
  ansible.builtin.blockinfile:
    path: /etc/fstab
    marker: "# Enable second drive ({mark})"
    block: |
      UUID=12db19d7-bb38-43dc-b211-c88b5192a647	{{ home_path }}/SecondDrive	xfs	rw,relatime,inode64,logbsize=32k,noquota	0	0
