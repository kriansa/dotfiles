# Override Arch's default connectivity check (ping.archlinux.org), which is
# distant and intermittently drops TCP, causing false CONNECTED_SITE <->
# CONNECTED_GLOBAL flapping. Cloudflare's captive-portal endpoint is anycast
# and returns 204; response= empty makes NetworkManager expect that 204.
[connectivity]
uri=http://cp.cloudflare.com/
response=
interval=300
